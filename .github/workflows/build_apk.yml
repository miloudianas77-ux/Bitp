name: Build APK GemmaClaw

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"
          targets: aarch64-linux-android

      - name: Cache Rust & Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

      - name: Build APK
        run: |
          chmod +x build_android.sh
          ./build_android.sh release arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GemmaClaw-release
          path: GemmaClaw_release.apk
          retention-days: 7
